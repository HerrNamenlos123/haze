name = "ui_layout"
version = "0.0.1"
description = "Pure layout engine: takes an element tree, runs Clay flexbox, emits draw commands via callbacks"
license = "MIT"
authors = []
type = "lib"

[dependencies]
fontstash = { path = "../fontstash" }
ui_elements = { path = "../ui_elements" }
# Not used directly (no import/qualified reference to ui_styling anywhere in
# this module's source) -- only needed because ui_elements' public API
# exposes ui_styling types (ComputedDivStyle/ComputedTextStyle), and build
# resolution needs them available transitively.
ui_styling = { path = "../ui_styling" }

[compiler]
# no special flags
